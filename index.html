<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Scorecard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: #000;
  color: #fff;
}

.header {
  text-align: center;
}

.header img {
  display: block;
  margin: 6px auto;
}

.neon-logo {
  max-width: 200px;
}

.fairmont-logo {
  max-width: 140px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 0 12px rgba(57,255,20,0.25);
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #39ff14;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #0f2f0f;
  color: #39ff14;
  font-weight: 600;
}

input {
  width: 100%;
  max-width: 50px;
  text-align: center;
  font-size: 16px;
  border: none;
  background: transparent;
  color: #fff;
}

.name-input {
  width: 100%;
  border-bottom: 1px solid #39ff14;
  font-weight: bold;
  color: #fff;
}

.total-row {
  font-weight: bold;
  background: #0a0a0a;
}

/* Score colors */
.under { color: #39ff14; }
.over { color: #ff3b3b; }
.even { color: #fff; }

/* Leader highlight (totals only) */
.leader {
  background: #ff2bd6 !important;
  color: #fff !important;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">
  <img src="Neon9.jpg" class="neon-logo">
  <img src="fmscp.png" class="fairmont-logo">
</div>

<div class="card">

<table id="scoreTable">

<tr>
  <th>Hole</th>
  <th>Par</th>
  <th><input class="name-input" placeholder="Player 1"></th>
  <th><input class="name-input" placeholder="Player 2"></th>
  <th><input class="name-input" placeholder="Player 3"></th>
  <th><input class="name-input" placeholder="Player 4"></th>
</tr>

<script>
const pars = [3,2,4,2,2,2,2,2,3];

for (let i = 0; i < 9; i++) {
  document.write(`
    <tr>
      <td>${i+1}</td>
      <td>${pars[i]}</td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
    </tr>
  `);
}
</script>

<tr class="total-row">
  <td colspan="2">Total</td>
  <td id="t1">E</td>
  <td id="t2">E</td>
  <td id="t3">E</td>
  <td id="t4">E</td>
</tr>

</table>

</div>

<script>
function calcTotals() {
  let rows = document.querySelectorAll("#scoreTable tr");
  let totals = [0,0,0,0];

  // Clear previous leader highlights
  for (let i = 1; i <= 4; i++) {
    document.getElementById("t" + i).classList.remove("leader");
  }

  rows.forEach((row, rIndex) => {
    if (rIndex > 0 && rIndex <= 9) {
      let inputs = row.querySelectorAll("input[type='number']");
      inputs.forEach((input, i) => {
        let val = Number(input.value);
        let par = pars[rIndex - 1];

        if (!isNaN(val) && val > 0) {
          totals[i] += (val - par);
        }
      });
    }
  });

  // Update totals display + colors
  for (let i = 0; i < 4; i++) {
    let el = document.getElementById("t" + (i+1));
    let score = totals[i];

    el.innerText = score === 0 ? "E" : (score > 0 ? "+" + score : score);

    el.classList.remove("under","over","even");

    if (score < 0) el.classList.add("under");
    else if (score > 0) el.classList.add("over");
    else el.classList.add("even");
  }

  // Find leader (lowest score)
  let minScore = Math.min(...totals);

  totals.forEach((score, i) => {
    if (score === minScore) {
      document.getElementById("t" + (i+1)).classList.add("leader");
    }
  });
}
</script>

</body>
</html>
