<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Scorecard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f5f1e6;
}

.header {
  text-align: center;
}

.header img {
  display: block;
  margin: 6px auto;
}

.neon-logo {
  max-width: 200px;
}

.fairmont-logo {
  max-width: 140px;
  filter: brightness(0);
  opacity: 0.85;
}

.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #d3cbb8;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #e4efea;
  font-weight: 600;
}

input {
  width: 100%;
  max-width: 50px;
  text-align: center;
  font-size: 16px;
  border: none;
  background: transparent;
}

.name-input {
  width: 100%;
  border-bottom: 1px solid #aaa;
  font-weight: bold;
}

.total-row {
  font-weight: bold;
  background: #f0ece2;
}

.under { color: #2e7d32; }
.over { color: #c62828; }
.even { color: #333; }

/* 🔥 Highlight winning column */
.leader {
  background: #e8f5e9 !important;
}
</style>
</head>

<body>

<div class="header">
  <img src="Neon9.jpg" class="neon-logo">
  <img src="fmscp.png" class="fairmont-logo">
</div>

<div class="card">

<table id="scoreTable">

<tr>
  <th>Hole</th>
  <th>Par</th>
  <th><input class="name-input" placeholder="Player 1"></th>
  <th><input class="name-input" placeholder="Player 2"></th>
  <th><input class="name-input" placeholder="Player 3"></th>
  <th><input class="name-input" placeholder="Player 4"></th>
</tr>

<script>
const pars = [3,2,4,2,2,2,2,2,3];

for (let i = 0; i < 9; i++) {
  document.write(`
    <tr>
      <td>${i+1}</td>
      <td>${pars[i]}</td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
    </tr>
  `);
}
</script>

<tr class="total-row">
  <td colspan="2">Total</td>
  <td id="t1">E</td>
  <td id="t2">E</td>
  <td id="t3">E</td>
  <td id="t4">E</td>
</tr>

</table>

</div>

<script>
function calcTotals() {
  let rows = document.querySelectorAll("#scoreTable tr");
  let totals = [0,0,0,0];

  // Clear previous highlights
  document.querySelectorAll(".leader").forEach(el => el.classList.remove("leader"));

  rows.forEach((row, rIndex) => {
    if (rIndex > 0 && rIndex <= 9) {
      let inputs = row.querySelectorAll("input[type='number']");
      inputs.forEach((input, i) => {
        let val = Number(input.value);
        let par = pars[rIndex - 1];

        if (!isNaN(val) && val > 0) {
          totals[i] += (val - par);
        }
      });
    }
  });

  // Update totals display
  for (let i = 0; i < 4; i++) {
    let el = document.getElementById("t" + (i+1));
    let score = totals[i];

    el.innerText = score === 0 ? "E" : (score > 0 ? "+" + score : score);

    el.classList.remove("under","over","even");

    if (score < 0) el.classList.add("under");
    else if (score > 0) el.classList.add("over");
    else el.classList.add("even");
  }

  // 🔥 Find lowest score (leader)
  let minScore = Math.min(...totals);

  totals.forEach((score, i) => {
    if (score === minScore) {
      highlightColumn(i + 2); // offset for Hole + Par columns
    }
  });
}

// Highlight full column
function highlightColumn(colIndex) {
  let table = document.getElementById("scoreTable");

  for (let r = 0; r < table.rows.length; r++) {
    let cell = table.rows[r].cells[colIndex];
    if (cell) {
      cell.classList.add("leader");
    }
  }
}
</script>

</body>
</html>
