<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Scorecard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 8px;
  background: #000;
  color: #fff;
}

.header {
  text-align: center;
}

.header img {
  display: block;
  margin: 6px auto;
}

.neon-logo {
  max-width: 180px;
}

.fairmont-logo {
  max-width: 120px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 0 12px rgba(57,255,20,0.25);
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed; /* 🔥 fixes mobile alignment */
}

th, td {
  border: 1px solid #39ff14;
  padding: 6px 2px;
  text-align: center;
  font-size: 13px;
}

th {
  background: #0f2f0f;
  color: #39ff14;
  font-weight: 600;
}

/* 🔥 HOLE NUMBERS */
.hole {
  font-size: 18px;
  font-weight: bold;
  color: #ff2bd6;
  text-shadow:
    0 0 5px #ff2bd6,
    0 0 10px #ff2bd6,
    0 0 15px #ff2bd6;
}

/* Inputs */
input {
  width: 100%;
  max-width: 42px;
  text-align: center;
  font-size: 16px;
  border: none;
  background: transparent;
  color: #fff;
  margin: 0 auto;
  display: block;
}

/* Name inputs */
.name-input {
  border-bottom: 1px solid #39ff14;
  font-weight: bold;
  max-width: 70px;
}

/* Player colors (applied when filled) */
.p1 { color: #00e5ff; text-shadow: 0 0 6px #00e5ff; }
.p2 { color: #ff3b3b; text-shadow: 0 0 6px #ff3b3b; }
.p3 { color: #ffe600; text-shadow: 0 0 6px #ffe600; }
.p4 { color: #b026ff; text-shadow: 0 0 6px #b026ff; }

.total-row {
  font-weight: bold;
  background: #0a0a0a;
}

/* Score colors */
.under { color: #39ff14; }
.over { color: #ff3b3b; }
.even { color: #fff; }

/* Leader highlight */
.leader {
  background: #ff2bd6 !important;
  color: #fff !important;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">
  <img src="Neon9.jpg" class="neon-logo">
  <img src="fmscp.png" class="fairmont-logo">
</div>

<div class="card">

<table id="scoreTable">

<tr>
  <th>Hole</th>
  <th>Par</th>
  <th><input class="name-input" id="p1name" placeholder="P1"></th>
  <th><input class="name-input" id="p2name" placeholder="P2"></th>
  <th><input class="name-input" id="p3name" placeholder="P3"></th>
  <th><input class="name-input" id="p4name" placeholder="P4"></th>
</tr>

<script>
const pars = [3,2,4,2,2,2,2,2,3];

for (let i = 0; i < 9; i++) {
  document.write(`
    <tr>
      <td class="hole">${i+1}</td>
      <td>${pars[i]}</td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" pattern="[0-9]*" onchange="calcTotals()"></td>
    </tr>
  `);
}
</script>

<tr class="total-row">
  <td colspan="2">Total</td>
  <td id="t1">E</td>
  <td id="t2">E</td>
  <td id="t3">E</td>
  <td id="t4">E</td>
</tr>

</table>

</div>

<script>
// Apply player colors when names entered
document.getElementById("p1name").oninput = function() { this.classList.add("p1"); };
document.getElementById("p2name").oninput = function() { this.classList.add("p2"); };
document.getElementById("p3name").oninput = function() { this.classList.add("p3"); };
document.getElementById("p4name").oninput = function() { this.classList.add("p4"); };

function calcTotals() {
  let rows = document.querySelectorAll("#scoreTable tr");
  let totals = [0,0,0,0];

  for (let i = 1; i <= 4; i++) {
    document.getElementById("t" + i).classList.remove("leader");
  }

  rows.forEach((row, rIndex) => {
    if (rIndex > 0 && rIndex <= 9) {
      let inputs = row.querySelectorAll("input[type='number']");
      inputs.forEach((input, i) => {
        let val = Number(input.value);
        let par = pars[rIndex - 1];

        if (!isNaN(val) && val > 0) {
          totals[i] += (val - par);
        }
      });
    }
  });

  for (let i = 0; i < 4; i++) {
    let el = document.getElementById("t" + (i+1));
    let score = totals[i];

    el.innerText = score === 0 ? "E" : (score > 0 ? "+" + score : score);

    el.classList.remove("under","over","even");

    if (score < 0) el.classList.add("under");
    else if (score > 0) el.classList.add("over");
    else el.classList.add("even");
  }

  let minScore = Math.min(...totals);

  totals.forEach((score, i) => {
    if (score === minScore) {
      document.getElementById("t" + (i+1)).classList.add("leader");
    }
  });
}
</script>

</body>
</html>
