<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Scorecard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 6px;
  background: #000;
  color: #fff;
}

.header { text-align: center; }
.header img { display: block; margin: 4px auto; }

.neon-logo { max-width: 160px; }
.fairmont-logo {
  max-width: 110px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 0 12px rgba(57,255,20,0.25);
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid #39ff14;
  padding: 5px 2px;
  font-size: 12px;
}

/* 🔥 CENTER EVERYTHING PROPERLY */
td, th {
  text-align: center;
  vertical-align: middle;
}

td {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Headers */
th {
  background: #0f2f0f;
  color: #39ff14;
  font-family: 'Orbitron', sans-serif;
}

/* Left columns */
.hole-col, .par-col {
  background: #0f2f0f;
}

.hole-col { width: 32px; }
.par-col { width: 32px; }

.divider {
  border-right: 3px solid #39ff14 !important;
}

/* Hole numbers */
.hole {
  font-size: 16px;
  font-weight: bold;
  color: #ff2bd6;
  text-shadow: 0 0 10px #ff2bd6;
}

/* Inputs */
input {
  width: 100%;
  max-width: 40px;
  text-align: center;
  font-size: 15px;
  border: none;
  background: transparent;
  color: #fff;
  padding: 0;
}

/* Name inputs (FIXED) */
.name-input {
  max-width: 65px;
  font-size: 13px;
  border-bottom: 1px solid #39ff14;
  font-weight: bold;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
}

/* Player colors */
.p1 { color: #00e5ff; text-shadow: 0 0 6px #00e5ff; }
.p2 { color: #ff3b3b; text-shadow: 0 0 6px #ff3b3b; }
.p3 { color: #ffe600; text-shadow: 0 0 6px #ffe600; }
.p4 { color: #b026ff; text-shadow: 0 0 6px #b026ff; }

.total-row {
  background: #0a0a0a;
  font-weight: bold;
}

.total-label {
  font-family: 'Orbitron', sans-serif;
}

.under { color: #39ff14; }
.over { color: #ff3b3b; }
.even { color: #fff; }

/* Leader glow */
.leader {
  box-shadow: 0 0 10px #ff2bd6, 0 0 20px #ff2bd6;
  border-radius: 6px;
}

/* Button */
.clear-btn {
  display: block;
  margin: 14px auto;
  padding: 10px 18px;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  color: #fff;
  background: transparent;
  border: 2px solid #fff;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">
  <img src="Neon9.jpg" class="neon-logo">
  <img src="fmscp.png" class="fairmont-logo">
</div>

<div class="card">

<table id="scoreTable">
<tr>
  <th class="hole-col">Hole</th>
  <th class="par-col divider">Par</th>
  <th><input class="name-input" id="p1name" placeholder="P1"></th>
  <th><input class="name-input" id="p2name" placeholder="P2"></th>
  <th><input class="name-input" id="p3name" placeholder="P3"></th>
  <th><input class="name-input" id="p4name" placeholder="P4"></th>
</tr>

<script>
const pars = [3,2,4,2,2,2,2,2,3];

for (let i = 0; i < 9; i++) {
  document.write(`
    <tr>
      <td class="hole hole-col">${i+1}</td>
      <td class="par-col divider">${pars[i]}</td>
      <td><input type="number" min="1" inputmode="numeric" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" onchange="calcTotals()"></td>
      <td><input type="number" min="1" inputmode="numeric" onchange="calcTotals()"></td>
    </tr>
  `);
}
</script>

<tr class="total-row">
  <td colspan="2" class="divider total-label">Total</td>
  <td id="t1">E</td>
  <td id="t2">E</td>
  <td id="t3">E</td>
  <td id="t4">E</td>
</tr>

</table>

</div>

<button class="clear-btn" onclick="clearScores()">Clear Scores</button>

<script>
["p1name","p2name","p3name","p4name"].forEach((id,i)=>{
  document.getElementById(id).oninput=function(){
    this.classList.add("p"+(i+1));
    saveData();
  };
});

function saveData() {
  let data = [];
  document.querySelectorAll("input").forEach(i => data.push(i.value));
  localStorage.setItem("golfData", JSON.stringify(data));
}

function loadData() {
  let data = JSON.parse(localStorage.getItem("golfData") || "[]");
  document.querySelectorAll("input").forEach((input,i)=>{
    if (data[i]) input.value = data[i];
  });
  calcTotals();
}

function clearScores() {
  if (!confirm("Are you sure you want to clear all scores?")) return;
  document.querySelectorAll("input").forEach(i => i.value = "");
  localStorage.removeItem("golfData");
  calcTotals();
}

function calcTotals() {
  let rows = document.querySelectorAll("#scoreTable tr");
  let totals = [0,0,0,0];

  for (let i = 1; i <= 4; i++) {
    document.getElementById("t"+i).classList.remove("leader");
  }

  rows.forEach((row, rIndex)=>{
    if (rIndex>0 && rIndex<=9){
      let inputs = row.querySelectorAll("input[type='number']");
      inputs.forEach((input,i)=>{
        let val = Number(input.value);
        if (!isNaN(val) && val>0){
          totals[i]+=val - pars[rIndex-1];
        }
      });
    }
  });

  for (let i=0;i<4;i++){
    let el=document.getElementById("t"+(i+1));
    let score=totals[i];

    el.innerText = score===0 ? "E" : (score>0 ? "+"+score : score);

    el.classList.remove("under","over","even");
    if (score<0) el.classList.add("under");
    else if (score>0) el.classList.add("over");
    else el.classList.add("even");
  }

  let minScore = Math.min(...totals);
  totals.forEach((s,i)=>{
    if (s===minScore){
      document.getElementById("t"+(i+1)).classList.add("leader");
    }
  });

  saveData();
}

window.onload = loadData;
</script>

</body>
</html>
